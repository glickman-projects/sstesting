* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0F2544; color: #fff;
  font-family: 'SimpliSans', sans-serif;
  height: 100vh; overflow: hidden;
}

.field-bg {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.045; pointer-events: none; overflow: hidden;
}
.field-bg svg { width: 100%; height: 100%; }

/* ---- HEADER ---- */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  background: #0F2544; border-bottom: 4px solid #F79E00;
}
.header-yellow-bar { background: #F79E00; height: 5px; }
.header-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 52px 12px 52px; gap: 32px;
}
.logo-wrap { mix-blend-mode: screen; flex-shrink: 0; }
.logo-wrap img { height: 78px; width: auto; display: block; }
.title-block {
  flex: 1; display: flex; align-items: center;
  justify-content: center; text-align: center;
}
.title-main {
  font-family: 'SimpliSans', sans-serif;
  font-size: 44px; font-weight: 300;
  color: rgba(255,255,255,0.92);
  letter-spacing: 0.01em; line-height: 1; white-space: nowrap;
}
.title-main .word-hopes {
  font-weight: 700; color: #F79E00;
  font-size: 58px; letter-spacing: -0.01em;
}
.score-box {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 5px; flex-shrink: 0;
}
.score-label {
  font-family: 'SimpliSans', sans-serif; font-size: 10px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.4);
}
.score-num {
  background: rgba(247,158,0,0.12); border: 1px solid rgba(247,158,0,0.45);
  border-radius: 5px; padding: 5px 16px;
  font-family: "Courier New", monospace; font-size: 30px; font-weight: bold;
  color: #F79E00; letter-spacing: 0.06em; min-width: 60px; text-align: center;
}

/* ---- SCROLL ---- */
.scroll-outer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 5;
  overflow: hidden; cursor: pointer;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 7%, black 93%, transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 7%, black 93%, transparent 100%);
}

/* When paused, dim all cards via the container */
.scroll-outer.paused .card {
  opacity: 0.18;
  transition: opacity 0.35s ease;
}

/* The spotlit card overrides back to full brightness and gets color treatment */
.scroll-outer.paused .card.spotlit {
  opacity: 1;
  transition: opacity 0.35s ease;
}

.card {
  display: flex; align-items: center;
  gap: 28px; padding: 28px 72px 28px 56px;
  border-bottom: 1px solid rgba(79,203,247,0.12);
  transition: opacity 0.35s ease;
}
.card:nth-child(even) { background: rgba(79,203,247,0.04); }

.bullet {
  flex-shrink: 0; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.bullet svg { width: 100%; height: 100%; transition: transform 0.2s ease; }

.card-text {
  font-family: 'SimpliSans', sans-serif; font-size: 50px; font-weight: 300;
  line-height: 1.4; color: #fff; flex: 1; letter-spacing: 0.01em;
  transition: color 0.3s ease, font-weight 0.3s ease;
}

/* Spotlit card: text color matches its own triangle bullet */
.card.spotlit.yellow-card .card-text {
  color: #F79E00;
  font-weight: 500;
}
.card.spotlit.blue-card .card-text {
  color: #4FCBF7;
  font-weight: 500;
}

/* Fading back to normal */
.card.fading .card-text {
  color: #fff;
  font-weight: 300;
  transition: color 0.5s ease, font-weight 0.5s ease;
}

/* Pause hint */
.pause-hint {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 30; pointer-events: none;
  font-family: 'SimpliSans', sans-serif; font-size: 13px; font-weight: 400;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  opacity: 0; transition: opacity 0.4s ease;
}
.pause-hint.active { opacity: 1; }

/* ---- SETTINGS ---- */
.gear-btn {
  position: fixed; top: 10px; right: 14px; z-index: 200;
  background: none; border: none; cursor: pointer;
  opacity: 0.15; transition: opacity 0.25s; padding: 6px; line-height: 0;
}
.gear-btn:hover { opacity: 0.6; }
.gear-btn svg { width: 18px; height: 18px; fill: #fff; }
.settings-panel {
  position: fixed; top: 46px; right: 14px; z-index: 300;
  background: rgba(10,28,58,0.97); border: 1px solid rgba(247,158,0,0.4);
  border-radius: 8px; padding: 16px 18px; width: 230px; display: none;
  box-shadow: 0 8px 36px rgba(0,0,0,0.6);
}
.settings-panel.open { display: block; }
.sp-title {
  font-family: 'SimpliSans', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: #F79E00;
  border-bottom: 1px solid rgba(247,158,0,0.25); padding-bottom: 8px; margin-bottom: 10px;
}
.sp-label {
  font-family: 'SimpliSans', sans-serif; font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.5); margin: 12px 0 5px; display: block;
}
.sp-row { display: flex; align-items: center; gap: 7px; }
.sp-row input[type=range] { flex: 1; accent-color: #F79E00; cursor: pointer; }
.sp-val { font-family: "Courier New", monospace; font-size: 12px; color: #F79E00; min-width: 30px; text-align: right; }
.sp-num {
  width: 60px; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 4px;
  color: #fff; padding: 4px 6px; font-size: 14px;
  font-family: "Courier New", monospace; text-align: center;
}
.sp-arrow {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
  border-radius: 3px; color: #fff; width: 26px; height: 28px; cursor: pointer;
  font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.sp-arrow:hover { background: rgba(247,158,0,0.3); }
.sp-hint-setting { font-family: 'SimpliSans', sans-serif; font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }
</style>
</head>

    <div class="title-block">
      <div class="title-main"><span class="word-hopes">Hopes</span> We Carry Into This Year</div>
    </div>
    <div class="score-box">
      <span class="score-label">Responses</span>
      <div class="score-num" id="scoreNum">--</div>
    </div>

<div class="scroll-outer" id="scrollOuter">
  <div class="scroll-inner" id="scrollInner"></div>
</div>

<script>
var responses = [
  "That we move fast, and together. No more waiting for perfect.",
  "To see our customers actually feel the difference we are making this year.",
  "We finally break through the subscriber plateau and start growing again.",
  "That the new leadership team is as good as I believe they are.",
  "SimpliSafe becomes the company that people tell their neighbors about.",
  "We get clearer about priorities, and hold to them.",
  "Our teams feel as excited as they did when we first started.",
  "This is the year we close the gap between who we are and who we say we are.",
  "That every one of us leaves Boston more aligned than we arrived.",
  "We stop treating platform as something that happens later. It starts now.",
  "Customers feel genuinely protected, and they know it is us doing that.",
  "That we build something here that outlasts all of us in this room.",
  "Our teams trust leadership again. Really trust. Not just go along.",
  "We make FY27 the year people point to later and say, that is when things changed.",
  "That we are honest with each other when things are not working.",
];

document.getElementById('scoreNum').textContent = responses.length;

var bulletY = '<svg viewBox="0 0 40 40"><polygon points="8,6 34,20 8,34" fill="#F79E00"/></svg>';
var bulletB = '<svg viewBox="0 0 40 40"><polygon points="8,6 34,20 8,34" fill="#4FCBF7"/></svg>';

function makeCards(items) {
  return items.map(function(text, i) {
    var isYellow = (i % 2 === 0);
    var bull = isYellow ? bulletY : bulletB;
    var colorClass = isYellow ? 'yellow-card' : 'blue-card';
    return '<div class="card ' + colorClass + '" data-idx="' + i + '">' +
      '<div class="bullet">' + bull + '</div>' +
      '<span class="card-text">' + text + '</span>' +
      '</div>';
  }).join('');
}

var inner = document.getElementById('scrollInner');
inner.innerHTML = makeCards(responses) + makeCards(responses) + makeCards(responses);

// ---- SCROLL ENGINE ----
var scrollOuter = document.getElementById('scrollOuter');
var header      = document.getElementById('header');
var pauseHint   = document.getElementById('pauseHint');
var yPos        = 0;
var pixelsPerSec = 60;
var lastTime    = null;
var oneSetHeight = 0;
var paused      = false;
var spotlitCard = null;

function measureAndPosition() {
  scrollOuter.style.top = header.offsetHeight + 'px';
  oneSetHeight = inner.scrollHeight / 3;
}

function step(ts) {
  if (!paused) {
    if (!lastTime) lastTime = ts;
    yPos += pixelsPerSec * (ts - lastTime) / 1000;
    if (yPos >= oneSetHeight) yPos -= oneSetHeight;
    inner.style.transform = 'translateY(-' + yPos + 'px)';
  }
  lastTime = ts;
  requestAnimationFrame(step);
}

window.addEventListener('load', function() {
  measureAndPosition();
  requestAnimationFrame(step);
});
window.addEventListener('resize', measureAndPosition);

// ---- SPOTLIGHT ----
function spotlight(card) {
  if (spotlitCard) clearSpotlight(true);
  spotlitCard = card;
  paused = true;
  scrollOuter.classList.add('paused');
  card.classList.add('spotlit');
  pauseHint.classList.add('active');
}

function clearSpotlight(immediate) {
  if (!spotlitCard) return;
  var card = spotlitCard;
  spotlitCard = null;
  paused = false;
  lastTime = null;
  scrollOuter.classList.remove('paused');
  card.classList.remove('spotlit');
  card.classList.add('fading');
  pauseHint.classList.remove('active');
  setTimeout(function() { card.classList.remove('fading'); }, 500);
}

scrollOuter.addEventListener('click', function(e) {
  var card = e.target.closest('.card');
  if (!card) { clearSpotlight(false); return; }
  if (paused && spotlitCard === card) {
    clearSpotlight(false);
  } else {
    spotlight(card);
  }
});

// ---- SETTINGS ----
var gear  = document.getElementById('gearBtn');
var panel = document.getElementById('settingsPanel');
gear.addEventListener('click', function(e) { e.stopPropagation(); panel.classList.toggle('open'); });
document.addEventListener('click', function(e) {
  if (!panel.contains(e.target) && e.target !== gear) panel.classList.remove('open');
});

document.getElementById('speedRange').addEventListener('input', function() {
  pixelsPerSec = parseInt(this.value);
  document.getElementById('speedDisp').textContent = this.value;
  lastTime = null;
});

var fntInput = document.getElementById('fntInput');
function applyFont(val) {
  val = Math.max(18, Math.min(120, parseInt(val) || 50));
  fntInput.value = val;
  document.querySelectorAll('.card-text').forEach(function(el) { el.style.fontSize = val + 'px'; });
  setTimeout(function() {
    oneSetHeight = inner.scrollHeight / 3;
    if (yPos > oneSetHeight) yPos = 0;
  }, 50);
}
fntInput.addEventListener('change', function() { applyFont(fntInput.value); });
document.getElementById('fntUp').addEventListener('click', function() { applyFont(parseInt(fntInput.value) + 2); });
document.getElementById('fntDn').addEventListener('click', function() { applyFont(parseInt(fntInput.value) - 2); });
</script>
