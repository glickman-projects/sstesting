<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Win Together FY27 — Hopes</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0F2544;
  color: #fff;
  font-family: Georgia, "Times New Roman", serif;
  height: 100vh;
  overflow: hidden;
}

.field-bg {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.045; pointer-events: none; overflow: hidden;
}
.field-bg svg { width: 100%; height: 100%; }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  background: #0F2544;
  border-bottom: 4px solid #F79E00;
}
.header-yellow-bar { background: #F79E00; height: 5px; }
.header-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 14px 52px 16px 52px;
}
.header-left { display: flex; align-items: center; gap: 28px; }
.logo-wrap img { height: 82px; width: auto; display: block; }

.title-block { display: flex; flex-direction: column; gap: 3px; }
.title-eyebrow {
  font-family: Arial, sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase; color: #4FCBF7;
}
.title-sub {
  font-family: Georgia, serif; font-size: 22px; color: rgba(255,255,255,0.85);
}
.title-hopes {
  font-family: Arial, sans-serif;
  font-size: 56px; font-weight: 900; font-style: italic;
  color: #F79E00; text-transform: uppercase;
  letter-spacing: -0.01em; line-height: 0.92;
  display: inline-block;
}

.score-box {
  display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
}
.score-label {
  font-family: Arial, sans-serif; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.score-num {
  background: rgba(247,158,0,0.12);
  border: 1px solid rgba(247,158,0,0.45);
  border-radius: 5px; padding: 5px 16px;
  font-family: "Courier New", monospace;
  font-size: 30px; font-weight: bold;
  color: #F79E00; letter-spacing: 0.06em;
  min-width: 60px; text-align: center;
}

.scroll-outer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 5;
  overflow: hidden;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 7%, black 93%, transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 7%, black 93%, transparent 100%);
}
.scroll-inner { }

.card {
  display: flex; align-items: center;
  gap: 32px; padding: 28px 72px 28px 56px;
  border-bottom: 1px solid rgba(79,203,247,0.12);
}
.card:nth-child(even) { background: rgba(79,203,247,0.04); }

/* SVG bullet — sized to match text rhythm */
.bullet {
  flex-shrink: 0;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
}
.bullet svg { width: 100%; height: 100%; }

.card-text {
  font-family: Georgia, serif;
  font-size: 50px; line-height: 1.4;
  color: #fff; flex: 1;
  letter-spacing: 0.01em;
}

/* ---- SETTINGS ---- */
.gear-btn {
  position: fixed; top: 10px; right: 14px; z-index: 200;
  background: none; border: none; cursor: pointer;
  opacity: 0.15; transition: opacity 0.25s; padding: 6px; line-height: 0;
}
.gear-btn:hover { opacity: 0.6; }
.gear-btn svg { width: 18px; height: 18px; fill: #fff; }

.settings-panel {
  position: fixed; top: 46px; right: 14px; z-index: 300;
  background: rgba(10,28,58,0.97);
  border: 1px solid rgba(247,158,0,0.4);
  border-radius: 8px; padding: 16px 18px; width: 230px; display: none;
  box-shadow: 0 8px 36px rgba(0,0,0,0.6);
}
.settings-panel.open { display: block; }
.sp-title {
  font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #F79E00; border-bottom: 1px solid rgba(247,158,0,0.25);
  padding-bottom: 8px; margin-bottom: 10px;
}
.sp-label {
  font-family: Arial, sans-serif; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); margin: 12px 0 5px; display: block;
}
.sp-row { display: flex; align-items: center; gap: 7px; }
.sp-row input[type=range] { flex: 1; accent-color: #F79E00; cursor: pointer; }
.sp-val { font-family: "Courier New", monospace; font-size: 12px; color: #F79E00; min-width: 30px; text-align: right; }
.sp-num {
  width: 60px; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 4px;
  color: #fff; padding: 4px 6px;
  font-size: 14px; font-family: "Courier New", monospace; text-align: center;
}
.sp-arrow {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 3px; color: #fff; width: 26px; height: 28px;
  cursor: pointer; font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.sp-arrow:hover { background: rgba(247,158,0,0.3); }
.sp-hint { font-family: Arial, sans-serif; font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }
</style>
</head>

      <div class="score-num" id="scoreNum">--</div>
    </div>
  </div>
</div>

<div class="scroll-outer" id="scrollOuter">
  <div class="scroll-inner" id="scrollInner"></div>
</div>

<script>
var responses = [
  "That we move fast, and together. No more waiting for perfect.",
  "To see our customers actually feel the difference we are making this year.",
  "We finally break through the subscriber plateau and start growing again.",
  "That the new leadership team is as good as I believe they are.",
  "SimpliSafe becomes the company that people tell their neighbors about.",
  "We get clearer about priorities, and hold to them.",
  "Our teams feel as excited as they did when we first started.",
  "This is the year we close the gap between who we are and who we say we are.",
  "That every one of us leaves Boston more aligned than we arrived.",
  "We stop treating platform as something that happens later. It starts now.",
  "Customers feel genuinely protected, and they know it is us doing that.",
  "That we build something here that outlasts all of us in this room.",
  "Our teams trust leadership again. Really trust. Not just go along.",
  "We make FY27 the year people point to later and say, that is when things changed.",
  "That we are honest with each other when things are not working.",
];

document.getElementById('scoreNum').textContent = responses.length;

// X bullet — yellow, bold, playbook style
var bulletX = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><line x1="6" y1="6" x2="34" y2="34" stroke="#F79E00" stroke-width="6" stroke-linecap="round"/><line x1="34" y1="6" x2="6" y2="34" stroke="#F79E00" stroke-width="6" stroke-linecap="round"/></svg>';

// O bullet — light blue, circle, playbook style
var bulletO = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="13" stroke="#4FCBF7" stroke-width="5" fill="none"/></svg>';

function makeCards(items) {
  return items.map(function(text, i) {
    var bull = (i % 2 === 0) ? bulletX : bulletO;
    return '<div class="card">' +
      '<div class="bullet">' + bull + '</div>' +
      '<span class="card-text">' + text + '</span>' +
      '</div>';
  }).join('');
}

var inner = document.getElementById('scrollInner');
inner.innerHTML = makeCards(responses) + makeCards(responses) + makeCards(responses);

var scrollOuter = document.getElementById('scrollOuter');
var header = document.getElementById('header');
var yPos = 0;
var pixelsPerSec = 60;
var lastTime = null;
var oneSetHeight = 0;

function measureAndPosition() {
  var hh = header.offsetHeight;
  scrollOuter.style.top = hh + 'px';
  oneSetHeight = inner.scrollHeight / 3;
}

function step(timestamp) {
  if (!lastTime) lastTime = timestamp;
  var delta = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  yPos += pixelsPerSec * delta;
  if (yPos >= oneSetHeight) { yPos -= oneSetHeight; }
  inner.style.transform = 'translateY(-' + yPos + 'px)';
  requestAnimationFrame(step);
}

window.addEventListener('load', function() {
  measureAndPosition();
  requestAnimationFrame(step);
});
window.addEventListener('resize', measureAndPosition);

// Settings
var gear = document.getElementById('gearBtn');
var panel = document.getElementById('settingsPanel');
gear.addEventListener('click', function(e) {
  e.stopPropagation();
  panel.classList.toggle('open');
});
document.addEventListener('click', function(e) {
  if (!panel.contains(e.target) && e.target !== gear) {
    panel.classList.remove('open');
  }
});

var speedRange = document.getElementById('speedRange');
var speedDisp = document.getElementById('speedDisp');
speedRange.addEventListener('input', function() {
  pixelsPerSec = parseInt(speedRange.value);
  speedDisp.textContent = speedRange.value;
  lastTime = null;
});

var fntInput = document.getElementById('fntInput');
function applyFont(val) {
  val = Math.max(18, Math.min(120, parseInt(val) || 50));
  fntInput.value = val;
  var cards = document.querySelectorAll('.card-text');
  for (var i = 0; i < cards.length; i++) { cards[i].style.fontSize = val + 'px'; }
  setTimeout(function() {
    oneSetHeight = inner.scrollHeight / 3;
    if (yPos > oneSetHeight) yPos = 0;
  }, 50);
}
fntInput.addEventListener('change', function() { applyFont(fntInput.value); });
document.getElementById('fntUp').addEventListener('click', function() { applyFont(parseInt(fntInput.value) + 2); });
document.getElementById('fntDn').addEventListener('click', function() { applyFont(parseInt(fntInput.value) - 2); });
</script>
</body>
</html>
